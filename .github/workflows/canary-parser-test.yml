name: Parser Canary Tests

on:
  schedule:
    # Run at :17 past every hour (offset avoids the GitHub cron stampede at :00)
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      force_fresh_login:
        description: >-
          Delete cached session state before running, forcing a full
          login + device verification flow (useful for testing the OTP path).
        type: boolean
        default: false

concurrency:
  group: canary-parser
  cancel-in-progress: true

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm install

      # ── Playwright browser caching ──────────────────────────────
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS dependencies (cached browsers)
        run: npx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'

      # ── Playwright session state caching ─────────────────────────
      - name: Restore Playwright session state
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.force_fresh_login == true) }}
        uses: actions/cache@v4
        id: pw-state
        with:
          path: playwright-state.json
          key: playwright-state-${{ github.run_id }}
          restore-keys: |
            playwright-state-

      - name: Delete cached session state (force fresh login)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_fresh_login == true }}
        run: rm -f playwright-state.json

      # ── Run canary tests ────────────────────────────────────────
      - name: Run canary parser tests
        run: npm run canary:test
        env:
          GH_CANARY_PAT: ${{ secrets.GH_CANARY_PAT }}
          GH_CANARY_USERNAME: ${{ secrets.GH_CANARY_USERNAME }}
          GH_CANARY_PASSWORD: ${{ secrets.GH_CANARY_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      # ── Discord alert on failure ────────────────────────────────

      # We check the status API as a separate step rather than relying
      # solely on the test exit code — the test itself cannot easily
      # communicate *why* it failed to the workflow, and the status API
      # is the cheapest way to add context without coupling test code
      # to CI alerting.
      - name: Check GitHub status
        if: failure()
        id: gh-status
        run: |
          STATUS=$(curl -sf https://www.githubstatus.com/api/v2/status.json | jq -r '.status.indicator // "unknown"')
          echo "indicator=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Alert via Discord webhook
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"

          if [ "${{ steps.gh-status.outputs.indicator }}" != "none" ]; then
            CONTENT="@here **Parser Canary FAILED — likely a GitHub outage (not a DOM change).**"
            TITLE="GitHub Outage Detected (Not a DOM Change)"
            DESC="GitHub is reporting degraded status (\`${{ steps.gh-status.outputs.indicator }}\`). The canary failure is likely due to a GitHub outage, NOT a DOM change. Monitor https://www.githubstatus.com and wait for recovery."
            COLOR=16776960
          else
            CONTENT="@here **Parser Canary FAILED. GitHub may have changed their DOM.**"
            TITLE="Possible GitHub DOM Change"
            DESC="The hourly parser canary detected a possible GitHub DOM change. Inspect the run log and update \`patterns.json\` if needed."
            COLOR=16711680
          fi

          cat <<EOF | curl -sf -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d @-
          {
            "content": "${CONTENT}",
            "embeds": [
              {
                "title": "${TITLE}",
                "url": "${RUN_URL}",
                "color": ${COLOR},
                "description": "${DESC}",
                "fields": [
                  { "name": "Branch", "value": "\`${{ github.ref_name }}\`", "inline": true },
                  { "name": "Run", "value": "\`#${{ github.run_number }}\`", "inline": true },
                  { "name": "Time (UTC)", "value": "\`${TIMESTAMP}\`", "inline": true }
                ]
              }
            ]
          }
          EOF
